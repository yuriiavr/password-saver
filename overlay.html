<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Швидкий доступ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: rgba(18, 18, 28, 0.97);
      color: #e0e0e0;
      border-radius: 12px;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.1);
    }

    #search-wrap {
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    #searchInput {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    #searchInput:focus {
      border-color: rgba(120, 120, 255, 0.6);
    }
    #searchInput::placeholder { color: rgba(255,255,255,0.3); }

    #list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    #list::-webkit-scrollbar { width: 4px; }
    #list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    .item {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.15s;
      gap: 12px;
    }
    .item:hover, .item.selected {
      background: rgba(120, 120, 255, 0.2);
    }

    .item-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .item-icon-placeholder {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: rgba(255,255,255,0.1);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
    }

    .item-info {
      flex: 1;
      min-width: 0;
    }
    .item-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-login {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .copy-btn {
      padding: 5px 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    .copy-btn:hover { opacity: 0.8; }
    .copy-btn.login {
      background: rgba(80, 160, 255, 0.25);
      color: #7ac0ff;
    }
    .copy-btn.password {
      background: rgba(120, 255, 150, 0.2);
      color: #7affaa;
    }

    #empty {
      text-align: center;
      padding: 30px;
      color: rgba(255,255,255,0.25);
      font-size: 14px;
    }

    #hint {
      padding: 8px 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-between;
    }

    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(120, 255, 150, 0.2);
      border: 1px solid rgba(120, 255, 150, 0.4);
      color: #7affaa;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div id="search-wrap">
    <input id="searchInput" type="text" placeholder="Пошук запису..." autofocus />
  </div>
  <div id="list"></div>
  <div id="hint">
    <span>↑↓ навігація · Enter — копіювати пароль · Tab — копіювати логін</span>
    <span>Esc — закрити</span>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    let allItems = [];
    let filtered = [];
    let selectedIndex = 0;

    const searchInput = document.getElementById("searchInput");
    const listEl = document.getElementById("list");
    const toast = document.getElementById("toast");

    window.overlayApi.onData((items) => {
      allItems = items;
      renderList("");
      searchInput.focus();
    });

    function renderList(term) {
      filtered = term
        ? allItems.filter(i =>
            i.appName.toLowerCase().includes(term) ||
            i.login.toLowerCase().includes(term)
          )
        : allItems;

      selectedIndex = 0;
      listEl.innerHTML = "";

      if (filtered.length === 0) {
        listEl.innerHTML = '<div id="empty">Нічого не знайдено</div>';
        return;
      }

      filtered.forEach((item, idx) => {
        const div = document.createElement("div");
        div.className = "item" + (idx === 0 ? " selected" : "");
        div.dataset.idx = idx;

        let iconHtml;
        if (item.iconUrl) {
          iconHtml = `<img class="item-icon" src="${item.iconUrl}" onerror="this.style.display='none'" />`;
        } else {
          const letter = item.appName.charAt(0).toUpperCase();
          iconHtml = `<div class="item-icon-placeholder">${letter}</div>`;
        }

        div.innerHTML = `
          ${iconHtml}
          <div class="item-info">
            <div class="item-name">${item.appName}</div>
            <div class="item-login">${item.login}</div>
          </div>
          <div class="item-actions">
            <button class="copy-btn login" data-idx="${idx}">Логін</button>
            <button class="copy-btn password" data-idx="${idx}">Пароль</button>
          </div>
        `;

        div.querySelector(".copy-btn.login").addEventListener("click", (e) => {
          e.stopPropagation();
          copyAndClose(filtered[idx].login, "Логін скопійовано!");
        });
        div.querySelector(".copy-btn.password").addEventListener("click", (e) => {
          e.stopPropagation();
          copyAndClose(filtered[idx].password, "Пароль скопійовано!");
        });

        div.addEventListener("click", () => {
          copyAndClose(filtered[idx].password, "Пароль скопійовано!");
        });

        listEl.appendChild(div);
      });
    }

    function setSelected(idx) {
      const items = listEl.querySelectorAll(".item");
      items.forEach(el => el.classList.remove("selected"));
      if (items[idx]) {
        items[idx].classList.add("selected");
        items[idx].scrollIntoView({ block: "nearest" });
      }
      selectedIndex = idx;
    }

    function copyAndClose(text, message) {
      navigator.clipboard.writeText(text).then(() => {
        showToast(message);
        setTimeout(() => window.overlayApi.close(), 800);
      });
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1500);
    }

    searchInput.addEventListener("input", () => {
      renderList(searchInput.value.toLowerCase().trim());
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        window.overlayApi.close();
        return;
      }

      const items = listEl.querySelectorAll(".item");
      if (!items.length) return;

      if (e.key === "ArrowDown") {
        e.preventDefault();
        setSelected(Math.min(selectedIndex + 1, filtered.length - 1));
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        setSelected(Math.max(selectedIndex - 1, 0));
      } else if (e.key === "Enter") {
        e.preventDefault();
        if (filtered[selectedIndex]) {
          copyAndClose(filtered[selectedIndex].password, "Пароль скопійовано!");
        }
      } else if (e.key === "Tab") {
        e.preventDefault();
        if (filtered[selectedIndex]) {
          copyAndClose(filtered[selectedIndex].login, "Логін скопійовано!");
        }
      }
    });
  </script>
</body>
</html>
